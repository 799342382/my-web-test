<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频播放</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    text-align:center;
}

video{
    width:100%;
    height:100vh;
    object-fit:contain;
    background:black;
}
</style>
</head>

<body>

<video controls autoplay>
    <source src="video.mp4" type="video/mp4">
</video>

</body>
</html>
