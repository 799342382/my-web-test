<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#000;
}

video{
    width:100%;
    height:100vh;
    object-fit:contain;
    background:black;
}
</style>
</head>

<body>

<video id="player" controls autoplay></video>

<script>
const params = new URLSearchParams(window.location.search);
const v = params.get("v") || "1";

document.getElementById("player").src = "video" + v + ".mp4";
</script>

</body>
</html>
